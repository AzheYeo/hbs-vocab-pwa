<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="红宝书词源">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>红宝书词源复习</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">红宝书考研英语词汇</p>
          <h1>词源复习</h1>
        </div>
        <button id="installHelp" class="ghost-btn" type="button">安装</button>
      </header>

      <main id="view" class="view" aria-live="polite">
        <section class="loading">
          <h2>正在载入词表</h2>
          <p>首次打开会加载完整词源数据，之后可离线使用。</p>
        </section>
      </main>

      <nav class="tabbar" aria-label="主导航">
        <button class="tab is-active" data-view="today" type="button">今日</button>
        <button class="tab" data-view="units" type="button">Unit</button>
        <button class="tab" data-view="search" type="button">搜索</button>
        <button class="tab" data-view="mistakes" type="button">错词</button>
      </nav>
    </div>

    <dialog id="helpDialog" class="dialog">
      <form method="dialog">
        <h2>在 iPhone 上使用</h2>
        <ol>
          <li>把本项目部署到一个 HTTPS 地址。</li>
          <li>用 iPhone 的 Safari 打开这个地址。</li>
          <li>点底部分享按钮，选择“添加到主屏幕”。</li>
          <li>以后从桌面图标打开，就像普通 App 一样使用。</li>
        </ol>
        <p>学习进度保存在 Safari 本地。删除网站数据或换手机后，进度不会自动同步。</p>
        <button class="primary-btn" type="submit">知道了</button>
      </form>
    </dialog>

    <script src="app.js" type="module"></script>
  </body>
</html>
